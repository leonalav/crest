datasets:
  - repo: HuggingFaceFW/fineweb-edu
    subset: sample-10BT
    split: train
    text_field: text
    streaming: true
  - repo: tokyotech-llm/swallow-math
    split: train
    text_field: text
    streaming: true
  - repo: codeparrot/github-code-clean
    split: train
    text_field: code
    streaming: true
    max_tokens: 1000000000
format: arrow
task: arrow_episodic
path: data/episodic_arrow/default
episode_steps: 16
step_length: 128
train_episodes: 0
eval_episodes: 0
vocab_size: 128256
metadata:
  tokenizer: meta-llama/Meta-Llama-3-8B
  pad_token_id: 128001
  eos_token_id: 128001
